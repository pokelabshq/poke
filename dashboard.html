<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Poke Labs</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--purple:#667eea;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--dark:#0a0a0f;--card:#151520;--border:#2a2a3a;--text:#e0e0e0;--muted:#888}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--dark);color:var(--text);line-height:1.6}
.container{max-width:1100px;margin:0 auto;padding:0 2rem}
nav{display:flex;justify-content:space-between;align-items:center;padding:1.5rem 0;border-bottom:1px solid var(--border)}
nav .logo{font-size:1.4rem;font-weight:700;color:var(--text)}nav .logo span{color:var(--purple)}
nav a{color:var(--muted);text-decoration:none;font-size:0.95rem}nav a:hover{color:var(--text)}
h1{font-size:1.8rem;margin:2rem 0 0.5rem}
.subtitle{color:var(--muted);margin-bottom:2rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem;margin-bottom:2rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem}
.card h3{margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem}
.metric{display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid var(--border)}
.metric:last-child{border-bottom:none}
.metric .label{color:var(--muted);font-size:0.9rem}
.metric .value{font-weight:600}
.status-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:0.5rem}
.status-dot.green{background:var(--green)}.status-dot.red{background:var(--red)}.status-dot.yellow{background:var(--yellow)}
.refresh{text-align:center;color:var(--muted);font-size:0.85rem;margin:2rem 0}
.btn{display:inline-block;padding:0.5rem 1rem;background:var(--purple);color:#fff;border-radius:6px;text-decoration:none;font-size:0.85rem}
.btn:hover{opacity:0.85}
table{width:100%;border-collapse:collapse;margin-top:0.5rem}
th,td{text-align:left;padding:0.5rem;border-bottom:1px solid var(--border);font-size:0.9rem}
th{color:var(--muted);font-weight:600}
.badge{display:inline-block;padding:0.15rem 0.5rem;border-radius:4px;font-size:0.75rem;font-weight:600}
.badge-green{background:#1a3a2a;color:var(--green)}.badge-red{background:#3a1a1a;color:var(--red)}.badge-yellow{background:#3a2a1a;color:var(--yellow)}
</style>
</head>
<body>
<nav class="container">
  <div class="logo">poke<span>labs</span></div>
  <a href="/">← Back to Home</a>
</nav>
<div class="container">
<h1>📊 Dashboard</h1>
<p class="subtitle">Live status of all Poke Labs services and repos</p>

<div class="grid">
  <div class="card">
    <h3>🖥️ Services</h3>
    <div id="services">
      <div class="metric"><span class="label"><span class="status-dot yellow"></span>Loading...</span><span class="value">—</span></div>
    </div>
  </div>

  <div class="card">
    <h3>📦 Repos</h3>
    <div id="repos">
      <div class="metric"><span class="label">Loading...</span><span class="value">—</span></div>
    </div>
  </div>

  <div class="card">
    <h3>🔗 Link Preview API</h3>
    <div id="lp-api">
      <div class="metric"><span class="label">Loading...</span><span class="value">—</span></div>
    </div>
  </div>

  <div class="card">
    <h3>🤖 Poke Bot</h3>
    <div id="bot">
      <div class="metric"><span class="label">Loading...</span><span class="value">—</span></div>
    </div>
  </div>
</div>

<div class="card">
  <h3>📋 Recent Activity</h3>
  <table id="activity">
    <thead><tr><th>Time</th><th>Event</th><th>Status</th></tr></thead>
    <tbody><tr><td colspan="3" style="color:var(--muted)">Loading...</td></tr></tbody>
  </table>
</div>

<p class="refresh">Auto-refreshes every 30 seconds · <a href="#" onclick="location.reload()" class="btn">Refresh Now</a></p>
</div>

<script>
async function fetchJSON(url){
  try{const r=await fetch(url);return await r.json()}catch(e){return null}
}
function dot(ok){return `<span class="status-dot ${ok?'green':'red'}"></span>`}
function badge(txt,ok){return `<span class="badge ${ok?'badge-green':'badge-red'}">${txt}</span>`}

async function loadServices(){
  const h=await fetchJSON('/api/health');
  const el=document.getElementById('services');
  if(!h){el.innerHTML='<div class="metric"><span class="label">API unreachable</span></div>';return}
  el.innerHTML=`
    <div class="metric"><span class="label">${dot(true)}Link Preview API</span><span class="value">v${h.v||'?'}</span></div>
    <div class="metric"><span class="label">${dot(true)}Free Limit</span><span class="value">${h.free_limit||3}/day</span></div>
    <div class="metric"><span class="label">${dot(true)}Server</span><span class="value">Online</span></div>
  `;
}

async function loadRepos(){
  const repos=['pokelabshq/poke','pokelabshq/council'];
  const el=document.getElementById('repos');
  let html='';
  for(const repo of repos){
    const d=await fetchJSON(`https://api.github.com/repos/${repo}`);
    if(!d){html+=`<div class="metric"><span class="label">${repo}</span><span class="value">Error</span></div>`;continue}
    html+=`<div class="metric"><span class="label">${repo.split('/')[1]} ⭐${d.stargazers_count}</span><span class="value">${d.open_issues_count} issues</span></div>`;
  }
  el.innerHTML=html;
}

async function loadLP(){
  const s=await fetchJSON('/api/stats');
  const el=document.getElementById('lp-api');
  if(!s){el.innerHTML='<div class="metric"><span class="label">Unreachable</span></div>';return}
  el.innerHTML=`
    <div class="metric"><span class="label">Unique IPs</span><span class="value">${s.ips||0}</span></div>
    <div class="metric"><span class="label">Reqs (24h)</span><span class="value">${s.reqs_24h||0}</span></div>
  `;
}

async function loadBot(){
  const r=await fetch('http://localhost:8770/');
  const el=document.getElementById('bot');
  const ok=r.ok;
  el.innerHTML=`
    <div class="metric"><span class="label">${dot(ok)}Webhook Handler</span><span class="value">${badge(ok?'Online':'Offline',ok)}</span></div>
    <div class="metric"><span class="label">Port</span><span class="value">8770</span></div>
  `;
}

async function loadActivity(){
  const tbody=document.getElementById('activity').querySelector('tbody');
  const now=new Date().toLocaleTimeString();
  tbody.innerHTML=`<tr><td>${now}</td><td>Dashboard loaded</td><td><span class="badge badge-green">OK</span></td></tr>`;
}

async function refresh(){
  await Promise.all([loadServices(),loadRepos(),loadLP(),loadBot(),loadActivity()]);
}
refresh();
setInterval(refresh,30000);
</script>
</body>
</html>
